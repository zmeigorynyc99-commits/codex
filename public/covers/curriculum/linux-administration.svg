<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Linux System Administration track">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.6" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#07212c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#accent)"/>

  <g transform="translate(80,70)">
    <rect width="52" height="52" rx="12" fill="#2563eb"/>
    <text x="26" y="35" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">TT</text>
    <text x="70" y="24" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">botera</text>
    <text x="70" y="46" font-family="system-ui,sans-serif" font-size="15" fill="#22d3ee" letter-spacing="2">INFRASTRUCTURE CURRICULUM</text>
  </g>

  <g transform="translate(80,205)">
    <text font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#22d3ee" letter-spacing="3">TRACK · INTERMEDIATE → SENIOR</text>
    <text y="72" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">Linux System</text>
    <text y="132" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">Administration</text>
    <text y="192" font-family="system-ui,sans-serif" font-size="22" fill="#94a3b8">storage &amp; LVM · networking · scheduling · logging · tuning</text>
    <g transform="translate(0,232)" font-family="system-ui,sans-serif" font-size="17" font-weight="600">
      <rect width="172" height="34" rx="17" fill="#155e75"/>
      <text x="86" y="22" fill="#a5f3fc" text-anchor="middle">Run real servers</text>
      <rect x="188" width="180" height="34" rx="17" fill="#1e293b"/>
      <text x="278" y="22" fill="#cbd5e1" text-anchor="middle">RHCSA / LPIC path</text>
    </g>
  </g>

  <g transform="translate(760,150)">
    <rect width="360" height="300" rx="14" fill="#0a0f1c" stroke="#1e293b" stroke-width="1.5"/>
    <rect width="360" height="38" rx="14" fill="#111827"/>
    <rect y="20" width="360" height="18" fill="#111827"/>
    <circle cx="24" cy="19" r="6" fill="#ef4444"/>
    <circle cx="46" cy="19" r="6" fill="#f59e0b"/>
    <circle cx="68" cy="19" r="6" fill="#22c55e"/>
    <text x="180" y="24" font-family="ui-monospace,monospace" font-size="13" fill="#64748b" text-anchor="middle">bash — sysadmin</text>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14.5">
      <text x="20" y="78" fill="#22d3ee">$ <tspan fill="#e2e8f0">lsblk</tspan></text>
      <text x="20" y="100" fill="#94a3b8">sda   50G  disk</text>
      <text x="20" y="120" fill="#94a3b8">└─sda1 50G part /</text>
      <text x="20" y="150" fill="#22d3ee">$ <tspan fill="#e2e8f0">lvextend -L +10G /dev/vg/lv</tspan></text>
      <text x="20" y="172" fill="#22c55e">  Size extended</text>
      <text x="20" y="202" fill="#22d3ee">$ <tspan fill="#e2e8f0">df -h /</tspan></text>
      <text x="20" y="224" fill="#94a3b8">/dev/vg/lv  60G  42% /</text>
      <text x="20" y="254" fill="#22d3ee">$ <tspan fill="#e2e8f0" font-weight="700">_</tspan></text>
    </g>
  </g>

  <text x="80" y="585" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#64748b">botera.md/linux-tutorials</text>
</svg>
