<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Shell and Bash Scripting track">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.6" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0a2417"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#accent)"/>

  <g transform="translate(80,70)">
    <rect width="52" height="52" rx="12" fill="#2563eb"/>
    <text x="26" y="35" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">TT</text>
    <text x="70" y="24" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">botera</text>
    <text x="70" y="46" font-family="system-ui,sans-serif" font-size="15" fill="#34d399" letter-spacing="2">INFRASTRUCTURE CURRICULUM</text>
  </g>

  <g transform="translate(80,210)">
    <text font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#34d399" letter-spacing="3">TRACK · BEGINNER → ADVANCED</text>
    <text y="72" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">Shell &amp; Bash</text>
    <text y="132" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">Scripting</text>
    <text y="192" font-family="system-ui,sans-serif" font-size="22" fill="#94a3b8">variables · conditionals · loops · functions · robust automation</text>
    <g transform="translate(0,232)" font-family="system-ui,sans-serif" font-size="17" font-weight="600">
      <rect width="172" height="34" rx="17" fill="#065f46"/>
      <text x="86" y="22" fill="#a7f3d0" text-anchor="middle">Automate work</text>
      <rect x="188" width="180" height="34" rx="17" fill="#1e293b"/>
      <text x="278" y="22" fill="#cbd5e1" text-anchor="middle">set -euo pipefail</text>
    </g>
  </g>

  <g transform="translate(760,150)">
    <rect width="360" height="300" rx="14" fill="#0a0f1c" stroke="#1e293b" stroke-width="1.5"/>
    <rect width="360" height="38" rx="14" fill="#111827"/>
    <rect y="20" width="360" height="18" fill="#111827"/>
    <circle cx="24" cy="19" r="6" fill="#ef4444"/>
    <circle cx="46" cy="19" r="6" fill="#f59e0b"/>
    <circle cx="68" cy="19" r="6" fill="#22c55e"/>
    <text x="180" y="24" font-family="ui-monospace,monospace" font-size="13" fill="#64748b" text-anchor="middle">deploy.sh</text>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14.5">
      <text x="20" y="74" fill="#64748b">#!/usr/bin/env bash</text>
      <text x="20" y="98" fill="#34d399">set <tspan fill="#e2e8f0">-euo pipefail</tspan></text>
      <text x="20" y="130" fill="#c084fc">for <tspan fill="#e2e8f0">f </tspan>in <tspan fill="#e2e8f0">"$@"; </tspan>do</text>
      <text x="38" y="154" fill="#e2e8f0">deploy <tspan fill="#fbbf24">"$f"</tspan> || exit 1</text>
      <text x="20" y="178" fill="#c084fc">done</text>
      <text x="20" y="210" fill="#34d399">$ <tspan fill="#e2e8f0">./deploy.sh app web</tspan></text>
      <text x="20" y="234" fill="#22c55e">[ok] deployed 2 services</text>
    </g>
  </g>

  <text x="80" y="585" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#64748b">botera.md/linux-tutorials</text>
</svg>
