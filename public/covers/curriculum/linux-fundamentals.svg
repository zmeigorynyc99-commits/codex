<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Linux Fundamentals track">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.6" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0a2417"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#accent)"/>

  <g transform="translate(80,70)">
    <rect width="52" height="52" rx="12" fill="#2563eb"/>
    <text x="26" y="35" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">TT</text>
    <text x="70" y="24" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">botera</text>
    <text x="70" y="46" font-family="system-ui,sans-serif" font-size="15" fill="#4ade80" letter-spacing="2">INFRASTRUCTURE CURRICULUM</text>
  </g>

  <g transform="translate(80,215)">
    <text font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#4ade80" letter-spacing="4">TRACK · BEGINNER → INTERMEDIATE</text>
    <text y="74" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#ffffff">Linux Fundamentals</text>
    <text y="128" font-family="system-ui,sans-serif" font-size="22" fill="#94a3b8">the shell · files · text · permissions · processes · the help system</text>
    <g transform="translate(0,168)" font-family="system-ui,sans-serif" font-size="17" font-weight="600">
      <rect width="172" height="34" rx="17" fill="#14532d"/>
      <text x="86" y="22" fill="#bbf7d0" text-anchor="middle">Hands-on labs</text>
      <rect x="188" width="200" height="34" rx="17" fill="#1e293b"/>
      <text x="288" y="22" fill="#cbd5e1" text-anchor="middle">Graded assessments</text>
    </g>
  </g>

  <g transform="translate(760,150)">
    <rect width="360" height="300" rx="14" fill="#0a0f1c" stroke="#1e293b" stroke-width="1.5"/>
    <rect width="360" height="38" rx="14" fill="#111827"/>
    <rect y="20" width="360" height="18" fill="#111827"/>
    <circle cx="24" cy="19" r="6" fill="#ef4444"/>
    <circle cx="46" cy="19" r="6" fill="#f59e0b"/>
    <circle cx="68" cy="19" r="6" fill="#22c55e"/>
    <text x="180" y="24" font-family="ui-monospace,monospace" font-size="13" fill="#64748b" text-anchor="middle">bash — lesson 1</text>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="15">
      <text x="22" y="80" fill="#4ade80">$ <tspan fill="#e2e8f0">whoami</tspan></text>
      <text x="22" y="104" fill="#94a3b8">learner</text>
      <text x="22" y="136" fill="#4ade80">$ <tspan fill="#e2e8f0">pwd</tspan></text>
      <text x="22" y="160" fill="#94a3b8">/home/learner</text>
      <text x="22" y="192" fill="#4ade80">$ <tspan fill="#e2e8f0">ls -l</tspan></text>
      <text x="22" y="216" fill="#94a3b8">drwxr-xr-x  projects</text>
      <text x="22" y="250" fill="#4ade80">$ <tspan fill="#e2e8f0" font-weight="700">_</tspan></text>
    </g>
  </g>

  <text x="80" y="585" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#64748b">botera.md/linux-tutorials</text>
