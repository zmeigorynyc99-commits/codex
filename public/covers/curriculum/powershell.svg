<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="PowerShell track">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/><stop offset="0.6" stop-color="#0b1220"/><stop offset="1" stop-color="#0a1633"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d4ed8"/><stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#accent)"/>
  <g transform="translate(80,70)">
    <rect width="52" height="52" rx="12" fill="#2563eb"/>
    <text x="26" y="35" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">TT</text>
    <text x="70" y="24" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">botera</text>
    <text x="70" y="46" font-family="system-ui,sans-serif" font-size="15" fill="#38bdf8" letter-spacing="2">INFRASTRUCTURE CURRICULUM</text>
  </g>
  <g transform="translate(80,210)">
    <text font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#38bdf8" letter-spacing="3">TRACK · BEGINNER → ADVANCED</text>
    <text y="74" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#ffffff">PowerShell</text>
    <text y="128" font-family="system-ui,sans-serif" font-size="22" fill="#94a3b8">the object pipeline · cmdlets · scripts · modules · remoting</text>
    <g transform="translate(0,168)" font-family="system-ui,sans-serif" font-size="17" font-weight="600">
      <rect width="200" height="34" rx="17" fill="#1e3a8a"/><text x="100" y="22" fill="#bfdbfe" text-anchor="middle">Objects, not text</text>
      <rect x="216" width="150" height="34" rx="17" fill="#1e293b"/><text x="291" y="22" fill="#cbd5e1" text-anchor="middle">Cross-platform</text>
    </g>
  </g>
  <g transform="translate(760,150)">
    <rect width="360" height="300" rx="14" fill="#0a0f1c" stroke="#1e293b" stroke-width="1.5"/>
    <rect width="360" height="38" rx="14" fill="#111827"/><rect y="20" width="360" height="18" fill="#111827"/>
    <circle cx="24" cy="19" r="6" fill="#ef4444"/><circle cx="46" cy="19" r="6" fill="#f59e0b"/><circle cx="68" cy="19" r="6" fill="#22c55e"/>
    <text x="180" y="24" font-family="ui-monospace,monospace" font-size="13" fill="#64748b" text-anchor="middle">pwsh</text>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14">
      <text x="20" y="76" fill="#38bdf8">PS&gt; <tspan fill="#e2e8f0">Get-Process |</tspan></text>
      <text x="40" y="100" fill="#e2e8f0">Where CPU -gt 10 |</text>
      <text x="40" y="124" fill="#e2e8f0">Sort CPU -Desc |</text>
      <text x="40" y="148" fill="#e2e8f0">Select -First 3</text>
      <text x="20" y="182" fill="#94a3b8">Name      Id    CPU</text>
      <text x="20" y="204" fill="#22c55e">chrome  4821  142.3</text>
      <text x="20" y="238" fill="#38bdf8">PS&gt; <tspan fill="#e2e8f0" font-weight="700">_</tspan></text>
    </g>
  </g>
  <text x="80" y="585" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#64748b">botera.md/linux-tutorials</text>
