<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Networking track">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.6" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0a1f33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#accent)"/>

  <g transform="translate(80,70)">
    <rect width="52" height="52" rx="12" fill="#2563eb"/>
    <text x="26" y="35" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">TT</text>
    <text x="70" y="24" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">botera</text>
    <text x="70" y="46" font-family="system-ui,sans-serif" font-size="15" fill="#38bdf8" letter-spacing="2">INFRASTRUCTURE CURRICULUM</text>
  </g>

  <g transform="translate(80,210)">
    <text font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#38bdf8" letter-spacing="3">TRACK · BEGINNER → SENIOR</text>
    <text y="74" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#ffffff">Networking</text>
    <text y="128" font-family="system-ui,sans-serif" font-size="22" fill="#94a3b8">OSI &amp; TCP/IP · subnetting · routing · DNS · troubleshooting</text>
    <g transform="translate(0,168)" font-family="system-ui,sans-serif" font-size="17" font-weight="600">
      <rect width="172" height="34" rx="17" fill="#075985"/>
      <text x="86" y="22" fill="#bae6fd" text-anchor="middle">Vendor-neutral</text>
      <rect x="188" width="200" height="34" rx="17" fill="#1e293b"/>
      <text x="288" y="22" fill="#cbd5e1" text-anchor="middle">Network+ / CCNA</text>
    </g>
  </g>

  <g transform="translate(740,150)">
    <rect width="380" height="300" rx="14" fill="#0a0f1c" stroke="#1e293b" stroke-width="1.5"/>
    <!-- simple network diagram -->
    <g stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.85">
      <line x1="60" y1="80" x2="190" y2="150"/>
      <line x1="320" y1="80" x2="190" y2="150"/>
      <line x1="190" y1="150" x2="190" y2="230"/>
      <line x1="190" y1="230" x2="80" y2="250"/>
      <line x1="190" y1="230" x2="300" y2="250"/>
    </g>
    <g font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">
      <rect x="30" y="58" width="60" height="34" rx="6" fill="#0f2740" stroke="#38bdf8"/>
      <text x="60" y="79" text-anchor="middle" fill="#bae6fd">host</text>
      <rect x="290" y="58" width="60" height="34" rx="6" fill="#0f2740" stroke="#38bdf8"/>
      <text x="320" y="79" text-anchor="middle" fill="#bae6fd">host</text>
      <rect x="155" y="133" width="70" height="34" rx="6" fill="#13324f" stroke="#0ea5e9"/>
      <text x="190" y="154" text-anchor="middle" fill="#7dd3fc">router</text>
      <rect x="48" y="234" width="64" height="32" rx="6" fill="#0f2740" stroke="#38bdf8"/>
      <text x="80" y="254" text-anchor="middle" fill="#bae6fd">10.0.0/24</text>
      <rect x="268" y="234" width="64" height="32" rx="6" fill="#0f2740" stroke="#38bdf8"/>
      <text x="300" y="254" text-anchor="middle" fill="#bae6fd">10.0.1/24</text>
    </g>
  </g>

  <text x="80" y="585" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#64748b">botera.md/linux-tutorials</text>
</svg>
