<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Linux to DevOps Roadmap, Day 7">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.6" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#2a0a12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f43f5e"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#accent)"/>

  <g transform="translate(80,70)">
    <rect width="52" height="52" rx="12" fill="#2563eb"/>
    <text x="26" y="35" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">TT</text>
    <text x="70" y="24" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">botera</text>
    <text x="70" y="46" font-family="system-ui,sans-serif" font-size="15" fill="#fb7185" letter-spacing="2">LINUX → DEVOPS ROADMAP</text>
  </g>

  <g transform="translate(80,210)">
    <text font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#fb7185" letter-spacing="4">DAY 7</text>
    <text y="70" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">Firewalls &amp; Server</text>
    <text y="132" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">Hardening</text>
    <text y="196" font-family="system-ui,sans-serif" font-size="22" fill="#94a3b8">ufw rules · SSH hardening · fail2ban · least privilege</text>
    <g transform="translate(0,236)" font-family="system-ui,sans-serif" font-size="17" font-weight="600">
      <rect width="150" height="34" rx="17" fill="#881337"/>
      <text x="75" y="22" fill="#fecdd3" text-anchor="middle">Beginner</text>
      <rect x="166" width="150" height="34" rx="17" fill="#1e293b"/>
      <text x="241" y="22" fill="#cbd5e1" text-anchor="middle">~1 hour</text>
    </g>
  </g>

  <g transform="translate(720,150)">
    <rect width="400" height="300" rx="14" fill="#0a0f1c" stroke="#1e293b" stroke-width="1.5"/>
    <rect width="400" height="38" rx="14" fill="#111827"/>
    <rect y="20" width="400" height="18" fill="#111827"/>
    <circle cx="24" cy="19" r="6" fill="#ef4444"/>
    <circle cx="46" cy="19" r="6" fill="#f59e0b"/>
    <circle cx="68" cy="19" r="6" fill="#22c55e"/>
    <text x="200" y="24" font-family="ui-monospace,monospace" font-size="13" fill="#64748b" text-anchor="middle">bash — day7</text>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="15">
      <text x="22" y="78" fill="#fb7185">$ <tspan fill="#e2e8f0">sudo ufw allow OpenSSH</tspan></text>
      <text x="22" y="110" fill="#fb7185">$ <tspan fill="#e2e8f0">sudo ufw enable</tspan></text>
      <text x="22" y="134" fill="#22c55e">Firewall is active</text>
      <text x="22" y="166" fill="#fb7185">$ <tspan fill="#e2e8f0">sudo ufw status</tspan></text>
      <text x="22" y="190" fill="#94a3b8">22/tcp   <tspan fill="#22c55e">ALLOW</tspan>  Anywhere</text>
      <text x="22" y="214" fill="#94a3b8">80,443   <tspan fill="#22c55e">ALLOW</tspan>  Anywhere</text>
      <text x="22" y="248" fill="#fb7185">$ <tspan fill="#e2e8f0" font-weight="700">_</tspan></text>
    </g>
  </g>

  <text x="80" y="585" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#64748b">botera.md/linux-tutorials</text>
</svg>
