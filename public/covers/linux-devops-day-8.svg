<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Linux to DevOps Roadmap, Day 8">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.6" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#16240a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#84cc16"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#accent)"/>

  <g transform="translate(80,70)">
    <rect width="52" height="52" rx="12" fill="#2563eb"/>
    <text x="26" y="35" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">TT</text>
    <text x="70" y="24" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">botera</text>
    <text x="70" y="46" font-family="system-ui,sans-serif" font-size="15" fill="#a3e635" letter-spacing="2">LINUX → DEVOPS ROADMAP</text>
  </g>

  <g transform="translate(80,210)">
    <text font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#a3e635" letter-spacing="4">DAY 8</text>
    <text y="70" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">Bash Scripting:</text>
    <text y="132" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="#ffffff">Automate Your Work</text>
    <text y="196" font-family="system-ui,sans-serif" font-size="22" fill="#94a3b8">variables · if &amp; loops · functions · arguments · exit codes</text>
    <g transform="translate(0,236)" font-family="system-ui,sans-serif" font-size="17" font-weight="600">
      <rect width="150" height="34" rx="17" fill="#3f6212"/>
      <text x="75" y="22" fill="#d9f99d" text-anchor="middle">Beginner</text>
      <rect x="166" width="150" height="34" rx="17" fill="#1e293b"/>
      <text x="241" y="22" fill="#cbd5e1" text-anchor="middle">~1 hour</text>
    </g>
  </g>

  <g transform="translate(720,150)">
    <rect width="400" height="300" rx="14" fill="#0a0f1c" stroke="#1e293b" stroke-width="1.5"/>
    <rect width="400" height="38" rx="14" fill="#111827"/>
    <rect y="20" width="400" height="18" fill="#111827"/>
    <circle cx="24" cy="19" r="6" fill="#ef4444"/>
    <circle cx="46" cy="19" r="6" fill="#f59e0b"/>
    <circle cx="68" cy="19" r="6" fill="#22c55e"/>
    <text x="200" y="24" font-family="ui-monospace,monospace" font-size="13" fill="#64748b" text-anchor="middle">backup.sh — day8</text>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14.5">
      <text x="22" y="74" fill="#64748b">#!/usr/bin/env bash</text>
      <text x="22" y="98" fill="#a3e635">set <tspan fill="#e2e8f0">-euo pipefail</tspan></text>
      <text x="22" y="130" fill="#c084fc">for <tspan fill="#e2e8f0">f </tspan>in <tspan fill="#e2e8f0">*.log; </tspan>do</text>
      <text x="40" y="154" fill="#e2e8f0">gzip <tspan fill="#fbbf24">"$f"</tspan></text>
      <text x="22" y="178" fill="#c084fc">done</text>
      <text x="22" y="210" fill="#a3e635">$ <tspan fill="#e2e8f0">./backup.sh</tspan></text>
      <text x="22" y="234" fill="#22c55e">[ok] archived 12 files</text>
    </g>
  </g>

  <text x="80" y="585" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#64748b">botera.md/linux-tutorials</text>
</svg>
