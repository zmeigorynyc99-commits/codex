user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/xml application/json application/javascript
    application/xml application/xml+rss image/svg+xml application/manifest+json;

  # Basic abuse protection: cap request body size and rate-limit.
  # Allow image uploads (cover images). The app itself caps uploads at 5 MB;
  # this gives a little headroom for multipart overhead.
  client_max_body_size 8m;
  limit_req_zone $binary_remote_addr zone=tinytools:10m rate=20r/s;

  # Upstream Next.js app (the "web" service on the compose network).
  upstream nextjs_upstream {
    server web:3000;
    keepalive 32;
  }

  include /etc/nginx/conf.d/*.conf;
}
