# Replace tinytools.example with your real domain throughout this file.

# ---- HTTP: ACME challenge + redirect to HTTPS ----
server {
  listen 80;
  listen [::]:80;
  server_name tinytools.example www.tinytools.example;

  # Let's Encrypt webroot challenge.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ---- HTTPS: serve the app ----
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name tinytools.example www.tinytools.example;

  # Certificates issued by certbot (see DEPLOYMENT.md).
  ssl_certificate     /etc/letsencrypt/live/tinytools.example/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tinytools.example/privkey.pem;

  # Modern, secure TLS configuration.
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  # Redirect www to the apex domain.
  if ($host = www.tinytools.example) {
    return 301 https://tinytools.example$request_uri;
  }

  limit_req zone=tinytools burst=40 nodelay;

  # Long-cache immutable Next.js build assets.
  location /_next/static/ {
    proxy_pass http://nextjs_upstream;
    proxy_cache_valid 200 60m;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /static/ {
    proxy_pass http://nextjs_upstream;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Everything else proxies to the Next.js server.
  location / {
    proxy_pass http://nextjs_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
